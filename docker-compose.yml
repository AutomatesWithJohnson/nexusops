version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nexusops
      POSTGRES_USER: nexusops
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  dashboard:
    build: .
    command: streamlit run src/dashboard/app.py --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
